# eval.yml — the DETERMINISTIC, keyless eval gate (A8 §4.6, Decision 4 + D-04).
#
# D-03 (2026-06-15 owner decision): the MODEL-graded score runs LOCALLY on the
# developer's Claude subscription (run_evals.py shells `claude -p`) — NOT in CI.
# GitHub Actions runners are headless (no Claude CLI, no subscription, no API key
# on purpose), so here the model grader self-skips and CI enforces ONLY the
# NON-WAIVABLE deterministic gate: a de-id leak, an invented citation, a
# missing-report — plus lint/tests in validate-skills.yml. The ≥4.0 model-graded
# bar is enforced by the dev's local run before pushing. There is NO model API key
# / secret anywhere in this workflow.
#
# A1 owned the wiring (triggers + job names + guarded invocations); A8/Plan 06
# fill the grader logic. Each job invokes run_evals.py / sme_review.py by its
# EXACT name + flags but SKIPS GRACEFULLY when the target script is absent: a
# `guard` step detects it and every work step is gated on
# `steps.guard.outputs.present == 'true'`. Nothing self-blocks (D-05) — the eval
# checks stage on at the first real skills/ commit.
#
# The three per-job `name:` strings (changed-skills-eval, deid-auto-fail,
# sme-persona-review) ARE the branch-protection status-check identifiers — do
# NOT rename. The top-level `name: Evaluate Skills` is the run display-name Plan
# 05 asserts on.
#
# D-04 SWEEP: a PR touching a SHARED-CONTRACT surface (template/, knowledge-base/,
# scripts/hse_components/, assets/report-engine/, template/evals/rubric.yaml) can
# break EVERY skill, so it triggers a FULL eval sweep (run_evals.py --all). A PR
# confined to skills/<one>/ evals ONLY that changed skill. The decision is made
# from `git diff --name-only` in the `decide` step below. (In CI every case runs
# deterministic-only — the model grader is a no-op without the CLI.)
#
# SECURITY (T-03-18): the trigger is `pull_request` (NOT pull_request_target). No
# model key is referenced anywhere — the model-graded path simply does not run in CI.
name: Evaluate Skills

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'skills/**'
      # Shared-contract paths — a change here can affect every skill's eval and
      # triggers the D-04 full sweep (decided in the `decide` step, not here).
      - 'template/**'
      - 'knowledge-base/**'
      - 'scripts/hse_components/**'
      - 'assets/report-engine/**'
      - 'template/evals/rubric.yaml'

jobs:
  changed-skills-eval:
    name: changed-skills-eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history so `git diff origin/main...HEAD` resolves the PR diff.
          fetch-depth: 0

      - id: guard
        name: Check eval runner exists
        run: |
          if [ -f "scripts/run_evals.py" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::scripts/run_evals.py not yet present (Phase 3/4, A8). Skipping changed-skills-eval."
          fi

      - name: Set up Python
        if: steps.guard.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.guard.outputs.present == 'true'
        run: pip install pyyaml jsonschema reportlab python-docx

      - id: decide
        name: Decide eval scope (D-04 sweep vs changed-skills)
        if: steps.guard.outputs.present == 'true'
        # SHARED-CONTRACT change -> full sweep (--all). Otherwise eval only the
        # skills/<name>/ dirs that changed. Emits `targets` = a space-separated
        # list of skill dirs, or the literal `--all`.
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha || 'HEAD~1' }}"
          CHANGED="$(git diff --name-only "$BASE"...HEAD || git diff --name-only HEAD~1...HEAD)"
          echo "changed files:"; echo "$CHANGED"
          if echo "$CHANGED" | grep -Eq '^(template/|knowledge-base/|scripts/hse_components/|assets/report-engine/|template/evals/rubric\.yaml)'; then
            echo "::notice::shared-contract surface changed -> FULL eval sweep (D-04)."
            echo "targets=--all" >> "$GITHUB_OUTPUT"
          else
            DIRS="$(echo "$CHANGED" | { grep -E '^skills/[^/]+/' || true; } | sed -E 's#^(skills/[^/]+)/.*#\1#' | sort -u | tr '\n' ' ')"
            if [ -z "$DIRS" ]; then
              echo "::notice::no skill or shared-contract change -> nothing to eval."
              echo "targets=" >> "$GITHUB_OUTPUT"
            else
              echo "::notice::single-skill scope -> $DIRS"
              echo "targets=$DIRS" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Evaluate changed skills (deterministic gate; model grader self-skips in CI)
        if: steps.guard.outputs.present == 'true' && steps.decide.outputs.targets != ''
        # No model key in CI (D-03): with no Claude CLI on the runner the model
        # grader is a no-op, so this enforces the deterministic hard blocks (de-id
        # leak / invented citation / missing report) over the changed skills and
        # exits nonzero on any of them. The model-graded ≥4.0 bar is a LOCAL check.
        run: |
          python scripts/run_evals.py --ci ${{ steps.decide.outputs.targets }}

  deid-auto-fail:
    name: deid-auto-fail
    # Its own job so a de-identification leak is unmistakable in the check name.
    # This is the deterministic HARD-FAIL auto-block (§4.4.1) — a leak cannot be
    # waived. run_evals.py runs the deterministic graders FIRST and short-circuits
    # the case on a de-id leak BEFORE the model grader; --ci makes that exit
    # nonzero. (This job needs no API key: the de-id hard block is deterministic.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: guard
        name: Check eval runner exists
        run: |
          if [ -f "scripts/run_evals.py" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::scripts/run_evals.py not yet present (Phase 3/4, A8). Skipping deid-auto-fail."
          fi

      - name: Set up Python
        if: steps.guard.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.guard.outputs.present == 'true'
        run: pip install pyyaml jsonschema reportlab python-docx

      - name: Run de-identification hard-fail grader (deterministic, no model call)
        if: steps.guard.outputs.present == 'true'
        run: |
          # CR-01 FIX: this keyless job formerly ran `run_evals.py --ci --all`,
          # but with no DEEPSEEK_API_KEY the executor returns "" — the de-id
          # grader then scanned empty text and the job passed UNCONDITIONALLY,
          # making the named hard block inert. It now runs --deid-selftest, which
          # grades the captured control artifacts under examples/deid-canary/ and
          # exits nonzero unless the seeded leak (leak.md) auto-fails AND the clean
          # report (clean.md) passes. The de-id hard block is thus itself tested
          # with ZERO model access — exactly what this job's name promises.
          python scripts/run_evals.py --deid-selftest

  sme-persona-review:
    name: sme-persona-review
    # Records pass-ran + findings (A8 §4.5). FLAG-but-DON'T-BLOCK class: a FLAG
    # NEVER fails the gate (sme_review.py always exits 0 — QA-05). The human
    # competent-person review (PR template) is the gate; this PRECEDES it
    # (SME-02). Kept DISTINCT from the deterministic hard blocks above.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: guard
        name: Check SME-review script exists
        run: |
          if [ -f "scripts/sme_review.py" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::scripts/sme_review.py not yet present (Phase 3, A8). Skipping sme-persona-review."
          fi

      - name: Set up Python
        if: steps.guard.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.guard.outputs.present == 'true'
        run: pip install pyyaml jsonschema reportlab python-docx

      - name: Run SME-persona review (records findings; a FLAG never blocks)
        if: steps.guard.outputs.present == 'true'
        # sme_review.py ALWAYS exits 0 (a FLAG is recorded-as-ran decision-support,
        # never a merge block — QA-05). The deterministic hard blocks live in the
        # deid-auto-fail + changed-skills-eval jobs, not here (two enforcement
        # classes stay distinct). Reviews every skill/example artifact present.
        run: |
          set -euo pipefail
          shopt -s nullglob
          ran_any=0
          for skill in skills/*/ examples/*/; do
            [ -d "$skill" ] || continue
            for art in "$skill"evals/files/*.md "$skill"references/*.md "$skill"SKILL.md; do
              [ -f "$art" ] || continue
              echo "::group::SME-review $art"
              python scripts/sme_review.py "$art"
              echo "::endgroup::"
              ran_any=1
            done
          done
          if [ "$ran_any" -eq 0 ]; then
            echo "::notice::no artifacts to SME-review yet (no skills/ or examples/ outputs)."
          fi
