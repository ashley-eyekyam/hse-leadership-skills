# metadata-vocab.yaml — single source of truth for the controlled vocabularies (A2 §4.1).
#
# Both template/metadata.schema.json (which inlines these as `enum` lists) and
# scripts/lint_skills.py (A8, Phase 3) import from THIS file. When you add or
# change a value, edit this file; an A8 gen_schema.py may later regenerate
# metadata.schema.json from here so the two never drift.
#
# tier is an integer range (1–4) in the schema; the flat list here is the
# canonical set of permitted values the linter checks membership against.

category:
  - risk-assessment
  - incident-management
  - compliance
  - training
  - contractor
  - emergency
  - culture
  - governance
  - performance
  - occ-health
  - psychosocial
  - process-safety
  - esg
  - ms-admin

audience: [M, E, F, C]

industry: [All, Gen, Con, "O&G", Chem, Process, Mfg, Min, Avi]

jurisdiction: [All, UK, US, IN, EU]

status: [stable, beta, assistive]

tier: [1, 2, 3, 4]

# plugin — the registered marketplace bundle a skill's metadata.plugin may name
# (A2 §4.2). SINGLE SOURCE OF TRUTH for the bundle set: the architecture is
# hse-core + the 5 sector packs (CLAUDE.md / v1.0 master plan §1.1). The linter's
# rule-6 bundle check derives REGISTERED_BUNDLES from THIS list, and
# gen_marketplace.build_manifest derives the manifest's plugin entries from each
# skill's metadata.plugin — both ultimately agree on this vocabulary (WR-05).
plugin:
  - hse-core
  - hse-process
  - hse-chemicals
  - hse-india
  - hse-aviation
  - hse-mining
  # hse-systems — the build-time bundle that carries the meta/tooling skill
  # hse-skill-forge (A10). Registered here so the forge's own metadata.plugin
  # resolves under lint rule 6 and gen_marketplace.build_manifest can mint it
  # (Phase-4 04-01 Wave-0 blocker fix). Framing is build-time tooling, not a
  # consultant artifact bundle (D-01).
  - hse-systems
